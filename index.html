<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Job Tracker</title>
  </head>
  <body class="bg-[#F8FAFC]">
    <div class="max-w-7xl mx-auto">
      <!--  -->

      <!-- Job Tracker Section -->
      <section class="py-14">
        <h1 class="text-3xl font-bold text-[#002C5C] mb-5 mx-5 md:mx-0">
          Job Application Tracker
        </h1>
        <div class="md:flex gap-4 mx-5 md:mx-0">
          <div class="p-4 bg-white rounded-xl flex-grow shadow-lg mt-4 md:mt-0">
            <h3 class="font-medium text-sm text-[#323B49]">Total</h3>
            <h1 id="total-applicants-number" class="font-bold text-2xl">0</h1>
          </div>
          <div class="p-4 bg-white rounded-xl flex-grow shadow-lg mt-4 md:mt-0">
            <h3 class="font-medium text-sm text-[#323B49]">Interviewed</h3>
            <h1 class="font-bold text-2xl">0</h1>
          </div>
          <div class="p-4 bg-white rounded-xl flex-grow shadow-lg mt-4 md:mt-0">
            <h3 class="font-medium text-sm text-[#323B49]">Rejected</h3>
            <h1 class="font-bold text-2xl">0</h1>
          </div>
        </div>
      </section>

      <!-- Available Jobs Section -->
      <section class="mx-5 md:mx-0">
        <div class="flex justify-between">
          <h1 class="font-semibold text-xl text-[#002C5C] mb-6">
            Available Jobs
          </h1>
          <p id="total-jobs" class="font-medium text-[#64748B]">0 jobs</p>
        </div>
        <div class="flex gap-2 mb-4">
          <div
            id="catagory-all"
            class="p-3 rounded-md  bg-[#3B82F6] text-white shadow-md cursor-pointer font-medium text-sm"
          >
            All
          </div>
          <div
            id="catagory-interviewed"
            class="p-3 rounded-md bg-white hover:bg-[#3B82F6] hover:text-white shadow-md cursor-pointer font-medium text-sm"
          >
            Interviewed
          </div>
          <div
            id="catagory-rejected"
            class="p-3 rounded-md bg-white hover:bg-[#3B82F6] hover:text-white shadow-md cursor-pointer font-medium text-sm"
          >
            Rejected
          </div>
        </div>

        <!-- cards -->
        <div id="card-container">
          
        </div>
      </section>
      <!--  -->
    </div>

    <script src="scripts/home.js"></script>
    <script src="scripts/category.js"></script>
  </body>
</html>
