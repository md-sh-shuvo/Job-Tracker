<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "Geist", sans-serif;
      }
    </style>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Job Tracker</title>
  </head>
  <body class="bg-[#F8FAFC]">
    <div class="max-w-7xl mx-auto">
      <div class="py-14">
        <h1 class="text-3xl font-bold text-[#002C5C] mb-5 mx-5 md:mx-0">
          Job Application Tracker
        </h1>
        <div class="md:flex gap-4 mx-5 md:mx-0">
            <div class="p-4 bg-white rounded-xl flex-grow shadow-lg mt-4 md:mt-0">
                <h3 class="font-medium text-sm text-[#323B49]">Total</h3>
                <h1 class="font-bold text-2xl">8</h1>
            </div>
            <div class="p-4 bg-white rounded-xl flex-grow shadow-lg mt-4 md:mt-0">
                <h3 class="font-medium text-sm text-[#323B49]">Interviewed</h3>
                <h1 class="font-bold text-2xl">0</h1>
            </div>
            <div class="p-4 bg-white rounded-xl flex-grow shadow-lg mt-4 md:mt-0">
                <h3 class="font-medium text-sm text-[#323B49]">Rejected</h3>
                <h1 class="font-bold text-2xl">0</h1>
            </div>
        </div>
      </div>
    </div>

    <script src="scripts/home.js"></script>
  </body>
</html>
